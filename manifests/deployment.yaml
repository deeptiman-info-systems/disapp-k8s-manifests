apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: apps   # 👈 IMPORTANT (you missed this earlier)
  annotations:
    argocd-image-updater.argoproj.io/image-list: user-service=registry.disapp.net:5000/user-service
    argocd-image-updater.argoproj.io/user-service.update-strategy: newest-build
    argocd-image-updater.argoproj.io/allow-tags: regexp:^[0-9]+$
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main

spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service

  template:
    metadata:
      labels:
        app: user-service

    spec:
      containers:
        - name: user-service
          image: registry.disapp.net:5000/user-service:1   # 👈 MUST have a real tag initially
          imagePullPolicy: Always
          ports:
            - containerPort: 8080