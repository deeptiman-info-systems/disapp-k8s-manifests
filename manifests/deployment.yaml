apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: apps

  annotations:

    # 👇 Image Updater watches this image
    argocd-image-updater.argoproj.io/image-list: user-service=registry.disapp.net:5000/user-service

    # 👇 Always pick latest pushed tag
    argocd-image-updater.argoproj.io/update-strategy: latest

    # 👇 Write back change to Git repo (TRUE GitOps)
    argocd-image-updater.argoproj.io/write-back-method: git

spec:
  replicas: 2

  selector:
    matchLabels:
      app: user-service

  template:
    metadata:
      labels:
        app: user-service

    spec:
      containers:
        - name: user-service

          # ⚠️ DO NOT PIN VERSION (important for automation)
          image: registry.disapp.net:5000/user-service:latest

          imagePullPolicy: Always

          ports:
            - containerPort: 8080