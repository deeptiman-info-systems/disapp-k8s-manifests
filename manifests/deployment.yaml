apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: apps

  annotations:
    argocd-image-updater.argoproj.io/image-list: user-service=registry.disapp.net:5000/user-service
    argocd-image-updater.argoproj.io/update-strategy: semver
    argocd-image-updater.argoproj.io/semver-range: ">=v1.0.0"
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main

spec:
  replicas: 2

  selector:
    matchLabels:
      app: user-service

  template:
    metadata:
      labels:
        app: user-service

    spec:
      containers:
        - name: user-service
          image: registry.disapp.net:5000/user-service:v1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080